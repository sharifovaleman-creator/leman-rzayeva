<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  width: 100%;
  height: 100vh;
  margin: 0;
  padding: 0;

  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;

  perspective: 800px;

  color: white;
  font-family: sans-serif;

  overflow-x: hidden;
  overflow-y: hidden;

  background: url("bg.jpg") center/cover no-repeat;
  position: relative;

  touch-action: none;
  user-select: none;
}

.card, button {
  position: relative;
  z-index: 1;
}

.card {
  width: 300px;
  max-width: 90%;

  border-radius: 20px;

  display: flex;
  justify-content: center;
  align-items: center;

  transform-style: preserve-3d;
  transition: transform 0.05s linear;
  will-change: transform;

}

.card::before {
  content: "";
  position: relative;
  inset: 0;
  border-radius: 20px;
  transform: translateZ(30px);
}

img {
  width: 100%;
  border-radius: 20px;
}

.text {
  position: absolute;
  bottom: 100%;              /* card-ın üstü */
  margin-bottom: 12px;       /* 10-15px məsafə */

  width: 100%;
  text-align: center;

  font-size: 26px;
  font-weight: bold;
  text-shadow: 0 0 10px black;

  opacity: 0;
  transition: 0.9s ease;

  transform: translateX(-30px) translateZ(40px);
}button {
  margin-top: 15px;
  padding: 12px 28px;
  border-radius: 14px;

  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);

  color: white;
  font-size: 22px;
  cursor: pointer;

  backdrop-filter: blur(10px);
}

.confetti {
  position: absolute;
  top: -20px;
  font-size: 32px;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
    opacity: 0;
  }
}

/* ❤️ heartbeat animasiya */
.heartbeat {
  animation: beat 0.6s ease 4;
}

@keyframes beat {
  0%   { transform: scale(1); }
  25%  { transform: scale(1.3); }
  50%  { transform: scale(1); }
  75%  { transform: scale(1.3); }
  100% { transform: scale(1); }
}

/* 🌧️ arxa fon axan text */
.floating-text {
  position: absolute;
  top: -20px;
  color: white;
  font-size: 18px;
  opacity: 0.8;
  animation: fallText linear forwards;
  pointer-events: none;
}

@keyframes fallText {
  to {
    transform: translateY(110vh);
    opacity: 0;
  }
}

</style>
</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<div class="card" id="card">
  <div class="text" id="textBox"></div>
  <img id="img" src="ftpxs.png">
</div>
<button id="startBtn">🎂 Start Party</button>

<audio id="music" src="yasmuzik.mp3"></audio>

<script>
const img = document.getElementById("img");
const card = document.getElementById("card");
const btn = document.getElementById("startBtn");
const music = document.getElementById("music");
const textBox = document.getElementById("textBox");

const images = ["ftpxs1.png", "ftpxs.png"];
let index = 0;

let smoothX = 0;
let smoothY = 0;

let lastX, lastY, lastZ;
let lastTime = 0;

const lines = [
  "🎉 Yeni yaşın uğurla gəlsin, Ləman! 🎂",
  "Bu gün sənin günündür — hər şey daha parlaq 💫",
  "Arzu et, gül, əylən… 🚀",
  "Telefonu silkələ 😄",
  "Happy Birthday! (kalp bas) ❤️"
];

let i = 0;

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

// 🎊 confetti emoji
function createConfetti() {
  const emojis = ["🎈", "💖", "✨", "🎉"];

  for (let i = 0; i < 50; i++) {
    let c = document.createElement("div");
    c.className = "confetti";
    c.innerText = emojis[Math.floor(Math.random() * emojis.length)];
    c.style.left = Math.random() * 100 + "vw";
    c.style.fontSize = (16 + Math.random() * 20) + "px";
    c.style.animationDuration = (2 + Math.random() * 3) + "s";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

// ✨ text animasiya
function showText() {
  if (i >= lines.length) return;

  textBox.style.opacity = 0;
  textBox.style.transform = "translateX(-30px) translateZ(40px)";

  setTimeout(() => {
    textBox.innerText = lines[i];
    textBox.style.opacity = 1;
    textBox.style.transform = "translateX(0) translateZ(40px)";
    i++;
    setTimeout(showText, 2500);
  }, 400);
}

// 🎯 sensorlar
function startSensors() {
  music.play().catch(() => {});
  btn.style.display = "none";
  showText();

  let baseBeta = null;
  let baseGamma = null;

  window.addEventListener("deviceorientation", (e) => {
    if (e.beta === null || e.gamma === null) return;

    if (baseBeta === null) {
      baseBeta = e.beta;
      baseGamma = e.gamma;
    }

    let maxTilt = 25;
    let x, y;

    if (window.innerWidth > window.innerHeight) {
      x = clamp(e.gamma - baseGamma, -maxTilt, maxTilt);
      y = clamp(e.beta - baseBeta, -maxTilt, maxTilt);
    } else {
      x = clamp(e.beta - baseBeta, -maxTilt, maxTilt);
      y = clamp(e.gamma - baseGamma, -maxTilt, maxTilt);
    }

    smoothX = smoothX * 0.85 + x * 0.15;
    smoothY = smoothY * 0.85 + y * 0.15;

    card.style.transform = `
      rotateX(${-smoothX}deg)
      rotateY(${smoothY}deg)
      translateZ(10px)
    `;
  });

  window.addEventListener("devicemotion", (e) => {
    let acc = e.accelerationIncludingGravity;
    if (!acc) return;

    if (lastX === undefined) {
      lastX = acc.x;
      lastY = acc.y;
      lastZ = acc.z;
      return;
    }

    let delta =
      Math.abs(acc.x - lastX) +
      Math.abs(acc.y - lastY) +
      Math.abs(acc.z - lastZ);

    if (delta > 20 && Date.now() - lastTime > 1500) {
      lastTime = Date.now();

      createConfetti();

      confetti({
        particleCount: 120,
        spread: 90,
        origin: { y: 0.5 }
      });

      index = (index + 1) % images.length;
      img.src = images[index];
    }

    lastX = acc.x;
    lastY = acc.y;
    lastZ = acc.z;
  });
}

// 🎂 start
btn.addEventListener("click", async () => {
  try {
    if (typeof DeviceMotionEvent !== "undefined" &&
        typeof DeviceMotionEvent.requestPermission === "function") {
      await DeviceMotionEvent.requestPermission();
    }

    if (typeof DeviceOrientationEvent !== "undefined" &&
        typeof DeviceOrientationEvent.requestPermission === "function") {
      await DeviceOrientationEvent.requestPermission();
    }

    startSensors();
  } catch {
    alert("İcazə verilmədi 😢");
  }
});

// 🔒 safety
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("touchstart", e => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

// ❤️ click detect
textBox.addEventListener("click", () => {
  if (!textBox.innerText.includes("❤️")) return;
  
  // 💓 heartbeat
  textBox.classList.add("heartbeat");
  
  setTimeout(() => {
    textBox.classList.remove("heartbeat");
    startFloatingTexts();
  }, 2500);
});

// 🌧️ arxa fonda text yağışı
function startFloatingTexts() {
  const messages = [
    "Ləman ❤️",
    "Happy Birthday 🎂",
    "Sən möhtəşəmsən ✨",
    "Arzuların çatsın 🚀",
    "Gül həmişə 😄",
    "Sevilirsən 💖"
  ];
  
  let count = Math.floor(Math.random() * 6) + 5; // 5-10 arası
  
  for (let i = 0; i < count; i++) {
    let t = document.createElement("div");
    t.className = "floating-text";
    t.innerText = messages[Math.floor(Math.random() * messages.length)];
    
    t.style.left = Math.random() * 100 + "vw";
    t.style.animationDuration = (3 + Math.random() * 4) + "s";
    
    document.body.appendChild(t);
    
    setTimeout(() => t.remove(), 7000);
  }
}

</script>

</body>
</html>
